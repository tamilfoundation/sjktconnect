{% extends "base.html" %}
{% block title %}Log In — SJK(T) Connect{% endblock %}

{% block content %}
<div class="login-container">
    <h1>Log In</h1>
    <p>Admin access for reviewing Hansard mentions.</p>

    {% if form.errors %}
    <div class="message message-error">
        Invalid username or password. Please try again.
    </div>
    {% endif %}

    <form method="post" class="login-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" class="form-input" autofocus required>
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" class="form-input" required>
        </div>
        <button type="submit" class="btn btn-primary">Log In</button>
        <input type="hidden" name="next" value="{{ next }}">
    </form>
</div>
{% endblock %}
